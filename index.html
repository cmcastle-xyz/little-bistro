<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的云餐厅 - 玉桂狗</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
  body{background:#fff9e6;padding:20px;min-height:100vh}
  .container{max-width:700px;margin:30px auto;background:#fff;border-radius:24px;padding:30px;box-shadow:0 8px 30px rgba(100,120,255,0.1)}
  .title{text-align:center;color:#4a90ff;margin-bottom:10px}
  .subtitle{text-align:center;color:#ff85a2;margin-bottom:30px}
  .auth-box{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
  .auth-box input{padding:12px;border-radius:12px;border:1px solid #ffe6f0;background:#fffdf5}
  .auth-btn{display:flex;gap:10px}
  .auth-btn button{flex:1;padding:12px;border:none;border-radius:12px;background:#4a90ff;color:white;font-weight:bold}
  .user-info{text-align:center;margin-bottom:20px;color:#4a90ff}
  .add-box{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap}
  .add-box input,select{flex:1;min-width:120px;padding:12px;border-radius:12px;border:1px solid #ffe6f0;background:#fffdf5}
  .add-btn{padding:12px 16px;background:#4a90ff;color:white;border:none;border-radius:12px}
  .dish{background:#fffbf0;border-left:6px solid #ffd166;padding:16px;border-radius:16px;margin-bottom:12px}
  .dish-main{display:flex;justify-content:space-between;align-items:center}
  .dish-name{font-size:16px;color:#333}
  .dish-cate{font-size:13px;color:#4a90ff;background:#eef5ff;padding:3px 8px;border-radius:6px;margin-right:8px}
  .dish-price{color:#ff6b9d;font-weight:bold}
  .del-btn{background:#ff85a2;color:white;border:none;padding:6px 10px;border-radius:8px;font-size:12px}
  .comment-box{margin-top:10px}
  .comment-input{width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;margin-top:6px}
  .send-btn{margin-top:6px;padding:6px 12px;background:#4a90ff;color:white;border:none;border-radius:8px;font-size:12px}
  .comment{background:#f0f7ff;padding:6px 10px;border-radius:6px;margin-top:6px;font-size:14px}
  .empty{text-align:center;padding:30px;color:#aaa}
  .logout{text-align:center;margin-top:20px}
  .logout button{padding:8px 16px;background:#ff85a2;color:white;border:none;border-radius:10px}
</style>
</head>
<body>
<div class="container">
  <h2 class="title">🐶 我的云餐厅</h2>
  <p class="subtitle">玉桂狗陪你安心点餐</p>

  <div class="auth-box" id="authBox">
    <input type="text" id="phone" placeholder="请输入手机号">
    <input type="password" id="pwd" placeholder="请输入密码">
    <div class="auth-btn">
      <button onclick="register()">注册</button>
      <button onclick="login()">登录</button>
    </div>
  </div>

  <div class="user-info" id="userInfo" style="display:none"></div>

  <div id="main" style="display:none">
    <div class="add-box">
      <input type="text" id="dishName" placeholder="菜品名称">
      <input type="number" id="dishPrice" placeholder="价格">
      <select id="dishCate">
        <option>热销</option><option>主食</option><option>小吃</option><option>饮品</option><option>甜品</option>
      </select>
      <button class="add-btn" onclick="addDish()">添加</button>
    </div>

    <div id="dishList"></div>

    <div class="logout">
      <button onclick="logout()">退出登录</button>
    </div>
  </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || {}
let dishes = JSON.parse(localStorage.getItem('dishes')) || []
let currentUser = null

function $(id){ return document.getElementById(id) }

function register(){
  let phone = $('phone').value.trim()
  let pwd = $('pwd').value.trim()
  if(!phone || !pwd){ alert('请输入手机号和密码'); return }
  if(users[phone]){ alert('已注册'); return }
  users[phone] = pwd
  localStorage.setItem('users', JSON.stringify(users))
  alert('注册成功！请登录')
}

function login(){
  let phone = $('phone').value.trim()
  let pwd = $('pwd').value.trim()
  if(!users[phone] || users[phone]!==pwd){ alert('账号或密码错误'); return }
  currentUser = phone
  localStorage.setItem('currentUser', currentUser)
  showMain()
}

function showMain(){
  $('authBox').style.display = 'none'
  $('userInfo').style.display = 'block'
  $('userInfo').innerText = '欢迎：' + currentUser
  $('main').style.display = 'block'
  renderDishes()
}

function logout(){
  currentUser = null
  localStorage.removeItem('currentUser')
  location.reload()
}

function renderDishes(){
  let html = ''
  if(dishes.length===0) html='<div class="empty">快来添加菜品吧～</div>'
  else dishes.forEach((item,i)=>{
    html+=`
    <div class="dish">
      <div class="dish-main">
        <div><span class="dish-cate">${item.cate}</span><span class="dish-name">${item.name}</span></div>
        <div style="display:flex;gap:8px">
          <span class="dish-price">¥${item.price}</span>
          <button class="del-btn" onclick="delDish(${i})">删除</button>
        </div>
      </div>
      <div class="comment-box">
        <input class="comment-input" id="c${i}" placeholder="发表评价">
        <button class="send-btn" onclick="sendComment(${i})">发布</button>
        <div>${(item.comments||[]).map(m=>`<div class="comment">${m.user}：${m.text}</div>`).join('')}</div>
      </div>
    </div>`
  })
  $('dishList').innerHTML = html
}

function addDish(){
  let n = $('dishName').value.trim(), p = $('dishPrice').value.trim(), c = $('dishCate').value
  if(!n||!p){alert('请填写完整');return}
  dishes.push({name:n,price:p,cate:c,comments:[]})
  localStorage.setItem('dishes',JSON.stringify(dishes))
  $('dishName').value='';$('dishPrice').value=''
  renderDishes()
}

function delDish(i){ dishes.splice(i,1); localStorage.setItem('dishes',JSON.stringify(dishes)); renderDishes() }
function sendComment(i){
  if(!currentUser){alert('请登录');return}
  let t = $('c'+i).value.trim()
  if(!t){alert('请输入内容');return}
  if(!dishes[i].comments) dishes[i].comments=[]
  dishes[i].comments.push({user:currentUser,text:t})
  localStorage.setItem('dishes',JSON.stringify(dishes))
  $('c'+i).value=''
  renderDishes()
}

window.onload=()=>{
  let u=localStorage.getItem('currentUser')
  if(u&&users[u]){currentUser=u;showMain()}
}
</script>
</body>
</html>
