<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玉桂狗美食社区</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
  body{background:#fff9e6;padding:15px;min-height:100vh}
  .container{max-width:700px;margin:0 auto;background:#fff;border-radius:24px;padding:25px;box-shadow:0 8px 30px rgba(100,120,255,0.1)}
  .title{text-align:center;color:#4a90ff;margin-bottom:6px}
  .subtitle{text-align:center;color:#ff85a2;margin-bottom:16px}
  .dog{text-align:center;font-size:48px;margin-bottom:10px}
  .auth-box{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
  .auth-box input{padding:12px;border-radius:12px;border:1px solid #ffe6f0;background:#fffdf5}
  .auth-btn{display:flex;gap:10px}
  .auth-btn button{flex:1;padding:12px;border:none;border-radius:12px;background:#4a90ff;color:white;font-weight:bold}
  .nav{display:flex;gap:10px;margin-bottom:15px}
  .nav button{flex:1;padding:10px;border-radius:12px;border:none;background:#eef5ff;color:#4a90ff}
  .search-box{width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;margin-bottom:15px}
  .post-box{border:1px solid #eee;border-radius:16px;padding:15px;margin-bottom:15px}
  .post-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;margin-bottom:10px}
  .preview{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .preview img{width:60px;height:60px;object-fit:cover;border-radius:8px}
  .btn{padding:10px 14px;background:#4a90ff;color:white;border:none;border-radius:10px;margin-right:5px}
  .pink{background:#ff85a2}
  .yellow{background:#ffd166;color:#333}
  .post{background:#fffbf0;border-radius:16px;padding:16px;margin-bottom:12px}
  .post-user{color:#4a90ff;font-weight:bold;margin-bottom:6px}
  .post-content{margin:8px 0}
  .post-info{font-size:14px;color:#666;margin:4px 0}
  .post-imgs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .post-imgs img{max-width:100px;height:100px;object-fit:cover;border-radius:10px}
  .stars{color:#ffd166;font-size:18px;margin:6px 0}
  .comment{background:#f0f7ff;padding:6px 10px;border-radius:6px;margin-top:6px;font-size:14px}
  .user-info{text-align:center;margin-bottom:15px;color:#4a90ff}
  .section{display:none}
  .section.active{display:block}
  .empty{text-align:center;padding:30px;color:#aaa}
  .follow{margin:8px 0}
  .item{padding:8px 12px;background:#f7f9ff;border-radius:8px;margin-bottom:8px}
</style>
</head>
<body>
<div class="container">
  <div class="dog">🐶</div>
  <h2 class="title">玉桂狗美食社区</h2>
  <p class="subtitle">三丽鸥美食菜谱分享</p>

  <div class="auth-box" id="authBox">
    <input type="text" id="phone" placeholder="手机号">
    <input type="password" id="pwd" placeholder="密码">
    <div class="auth-btn">
      <button onclick="register()">注册</button>
      <button onclick="login()">登录</button>
    </div>
  </div>

  <div id="main" style="display:none">
    <div class="user-info" id="userInfo"></div>
    <div class="nav">
      <button onclick="go('home')">首页</button>
      <button onclick="go('profile')">我的主页</button>
    </div>
    <input class="search-box" id="search" placeholder="搜索美食、地址、电话..." oninput="search()">

    <div id="home" class="section active">
      <div class="post-box">
        <textarea class="post-input" id="content" placeholder="分享你的美食菜谱~"></textarea>
        <input class="post-input" id="shopAddr" placeholder="店家地址">
        <input class="post-input" id="shopTel" placeholder="店家电话">
        <input type="file" id="imgFiles" multiple accept="image/*" onchange="previewImgs()">
        <div class="preview" id="preview"></div>
        <button class="btn" onclick="post()">发布</button>
      </div>
      <div id="list"></div>
    </div>

    <div id="profile" class="section">
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <button class="btn" onclick="showFollow('follow')">我关注</button>
        <button class="btn" onclick="showFollow('fans')">粉丝</button>
      </div>
      <div id="followList" class="follow"></div>
      <h3 style="margin-bottom:10px;color:#4a90ff">我发布的</h3>
      <div id="myPosts"></div>
      <h3 style="margin:20px 0;color:#4a90ff">我的心愿单</h3>
      <div id="wishlist"></div>
      <button class="btn pink" onclick="logout()" style="margin-top:20px">退出登录</button>
    </div>
  </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || {}
let posts = JSON.parse(localStorage.getItem('posts')) || []
let currentUser = localStorage.getItem('currentUser')
let imgList = []

let wish = JSON.parse(localStorage.getItem('wish')) || {}
let follow = JSON.parse(localStorage.getItem('follow')) || {}
let fans = JSON.parse(localStorage.getItem('fans')) || {}

function $(id){return document.getElementById(id)}

function register(){
  let phone = $('phone').value.trim(), pwd = $('pwd').value.trim()
  if(!phone||!pwd)return alert('请输入完整')
  if(users[phone])return alert('已注册')
  users[phone] = pwd
  follow[phone] = []
  fans[phone] = []
  localStorage.setItem('users', JSON.stringify(users))
  localStorage.setItem('follow', JSON.stringify(follow))
  localStorage.setItem('fans', JSON.stringify(fans))
  alert('注册成功！请登录')
}

function login(){
  let phone = $('phone').value.trim(), pwd = $('pwd').value.trim()
  if(users[phone] !== pwd)return alert('账号或密码错误')
  currentUser = phone
  localStorage.setItem('currentUser', currentUser)
  showMain()
}

function showMain(){
  $('authBox').style.display = 'none'
  $('main').style.display = 'block'
  $('userInfo').innerText = '欢迎：' + currentUser
  renderHome()
}

function go(id){
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'))
  $(id).classList.add('active')
  if(id === 'profile') renderProfile()
}

function previewImgs(){
  let files = $('imgFiles').files
  imgList = []
  $('preview').innerHTML = ''
  for(let i=0;i<Math.min(files.length,6);i++){
    let f = files[i]
    let r = new FileReader()
    r.onload = e=>{
      imgList.push(e.target.result)
      let img = document.createElement('img')
      img.src = e.target.result
      $('preview').appendChild(img)
    }
    r.readAsDataURL(f)
  }
}

// 格式化日期时间为 YYYY-MM-DD HH:mm:ss
function formatDateTime(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');
  return `${year}-${month}-${day} ${hours}:${minutes}`;
}

function post(){
  if(!currentUser)return alert('请登录')
  let c = $('content').value.trim()
  let addr = $('shopAddr').value.trim()
  let tel = $('shopTel').value.trim()
  if(!c && imgList.length===0)return alert('写点内容吧')
  posts.unshift({
    user:currentUser,
    content:c,
    addr:addr,
    tel:tel,
    imgs:imgList,
    comments:[],
    rate:0,
    time: formatDateTime(new Date()) // 记录发布时间
  })
  localStorage.setItem('posts', JSON.stringify(posts))
  $('content').value = ''
  $('shopAddr').value = ''
  $('shopTel').value = ''
  imgList = []
  $('preview').innerHTML = ''
  renderHome()
}

function renderHome(list=posts){
  let h = ''
  if(list.length===0) h='<div class="empty">暂无内容</div>'
  else list.forEach((p,i)=>{
    let isFollow = follow[currentUser]?.includes(p.user)
    let followBtn = p.user === currentUser ? '' :
      `<button class="btn yellow" onclick="toggleFollow('${p.user}')">${isFollow?'已关注':'关注'}</button>`
    h+=`
    <div class="post">
      <div class="post-user">${p.user}</div>
      ${followBtn}
      <div class="post-info">📅发布时间：${p.time || '未知时间'}</div>
      <div class="post-content">${p.content}</div>
      <div class="post-info">📍地址：${p.addr || '未填写'}</div>
      <div class="post-info">📞电话：${p.tel || '未填写'}</div>
      <div class="post-imgs">${p.imgs.map(s=>`<img src="${s}">`).join('')}</div>
      <div class="stars">${'★'.repeat(p.rate||0)}</div>
      <button class="btn" onclick="setRate(${i})">⭐打分</button>
      <button class="btn pink" onclick="addWish(${i})">加入心愿单</button>
      <input placeholder="评论" id="ci${i}" style="margin-top:8px;width:100%;padding:8px">
      <button class="btn" onclick="addComment(${i})">发送</button>
      ${p.comments.map(m=>`<div class="comment">${m.user}: ${m.text}</div>`).join('')}
    </div>`
  })
  $('list').innerHTML = h
}

function addComment(i){
  if(!currentUser)return
  let t = $('ci'+i).value.trim()
  if(!t)return
  posts[i].comments.push({user:currentUser, text:t})
  localStorage.setItem('posts', JSON.stringify(posts))
  renderHome()
}

function setRate(i){
  let s = prompt('输入1-5星','5')
  if(!s||s<1||s>5)return
  posts[i].rate = +s
  localStorage.setItem('posts', JSON.stringify(posts))
  renderHome()
}

function addWish(i){
  if(!currentUser)return
  if(!wish[currentUser]) wish[currentUser] = []
  wish[currentUser].push(posts[i])
  localStorage.setItem('wish', JSON.stringify(wish))
  alert('已加入心愿单')
}

function toggleFollow(target){
  if(target === currentUser)return
  if(!follow[currentUser]) follow[currentUser] = []
  if(!fans[target]) fans[target] = []
  let idx = follow[currentUser].indexOf(target)
  if(idx === -1){
    follow[currentUser].push(target)
    fans[target].push(currentUser)
  }else{
    follow[currentUser].splice(idx,1)
    fans[target] = fans[target].filter(u=>u!==currentUser)
  }
  localStorage.setItem('follow', JSON.stringify(follow))
  localStorage.setItem('fans', JSON.stringify(fans))
  renderHome()
}

function search(){
  let kw = $('search').value.trim().toLowerCase()
  let filtered = posts.filter(p => 
    p.content.toLowerCase().includes(kw) || 
    (p.addr || '').toLowerCase().includes(kw) || 
    (p.tel || '').toLowerCase().includes(kw)
  )
  renderHome(filtered)
}

function renderProfile(){
  let my = posts.filter(p=>p.user === currentUser)
  let w = wish[currentUser] || []
  $('myPosts').innerHTML = my.length ? my.map((p,i)=>`
  <div class="post">
    <div class="post-info">📅${p.time || '未知时间'}</div>
    <div class="post-content">${p.content}</div>
    <div class="post-info">📍${p.addr || '无地址'}</div>
  </div>`).join(''):'<div class="empty">暂无发布</div>'
  $('wishlist').innerHTML = w.length ? w.map((p,i)=>`
  <div class="post">
    <div class="post-content">${p.content}</div>
  </div>`).join(''):'<div class="empty">暂无心愿</div>'
}

function showFollow(type){
  let list = type === 'follow' ? (follow[currentUser]||[]) : (fans[currentUser]||[])
  $('followList').innerHTML = list.length ? list.map(u=>`<div class="item">${u}</div>`).join(''):'<div class="empty">暂无</div>'
}

function logout(){
  currentUser = null
  localStorage.removeItem('currentUser')
  location.reload()
}

window.onload=()=>{
  if(currentUser && users[currentUser]) showMain()
}
</script>
</body>
</html>
